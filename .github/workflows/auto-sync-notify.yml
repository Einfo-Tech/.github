name: Auto-sync WeCom Notify to All Repos

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 02:00（北京时间 10:00）运行
  workflow_dispatch:       # 也可手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure all org repos have WeCom notify workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_ADMIN_TOKEN }}
          script: |
            const owner = 'Einfo-Tech';
            const filePath = '.github/workflows/wecom-notify.yml';
            const notifyContent = Buffer.from(`name: Notify WeCom

on:
  push:
    branches: ['**']
  delete:
  pull_request:
    types: [opened, closed]

jobs:
  notify:
    uses: Einfo-Tech/.github/.github/workflows/wecom-notify.yml@main
    secrets: inherit
`).toString('base64');

            const repos = await github.paginate(github.rest.repos.listForOrg, {
              org: owner, per_page: 100
            });

            let added = [], skipped = [], failed = [];

            for (const r of repos) {
              if (r.name === '.github' || r.archived) {
                skipped.push(r.name);
                continue;
              }
              try {
                let sha;
                try {
                  const existing = await github.rest.repos.getContent({
                    owner, repo: r.name, path: filePath
                  });
                  // File already exists, skip
                  skipped.push(r.name);
                  continue;
                } catch (e) {
                  // File doesn't exist, will create
                }

                await github.rest.repos.createOrUpdateFileContents({
                  owner, repo: r.name,
                  path: filePath,
                  message: 'ci: auto-add WeCom notification workflow',
                  content: notifyContent
                });
                added.push(r.name);
                console.log(`✅ Injected: ${r.name}`);
              } catch (err) {
                failed.push(`${r.name} (${err.message})`);
                console.log(`❌ Failed: ${r.name} — ${err.message}`);
              }
            }

            console.log(`\n📊 Summary:`);
            console.log(`  ✅ Added: ${added.join(', ') || 'none'}`);
            console.log(`  ⏭️ Skipped: ${skipped.join(', ') || 'none'}`);
            console.log(`  ❌ Failed: ${failed.join(', ') || 'none'}`);
