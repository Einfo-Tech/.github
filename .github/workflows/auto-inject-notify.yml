name: Auto-inject WeCom Notify to New Repo

on:
  repository_dispatch:
    types: [repo_created]

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - name: Inject notify workflow into new repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_ADMIN_TOKEN }}
          script: |
            const repo = context.payload.client_payload.repo;
            const owner = context.payload.client_payload.owner || 'Einfo-Tech';

            const content = Buffer.from(`name: Notify WeCom

on:
  push:
    branches: ['**']
  delete:
  pull_request:
    types: [opened, closed]

jobs:
  notify:
    uses: Einfo-Tech/.github/.github/workflows/wecom-notify.yml@main
    secrets: inherit
`).toString('base64');

            try {
              // Check if file already exists
              let sha;
              try {
                const existing = await github.rest.repos.getContent({
                  owner, repo,
                  path: '.github/workflows/wecom-notify.yml'
                });
                sha = existing.data.sha;
              } catch (e) {
                // File doesn't exist, that's fine
              }

              await github.rest.repos.createOrUpdateFileContents({
                owner, repo,
                path: '.github/workflows/wecom-notify.yml',
                message: 'ci: auto-add WeCom notification workflow',
                content,
                ...(sha ? { sha } : {})
              });

              console.log(`✅ Injected notify workflow into ${owner}/${repo}`);
            } catch (err) {
              core.setFailed(`Failed to inject into ${owner}/${repo}: ${err.message}`);
            }
