name: Bulk-inject WeCom Notify (one-shot)

on:
  workflow_dispatch:

jobs:
  bulk-inject:
    runs-on: ubuntu-latest
    steps:
      - name: Inject notify workflow into all org repos
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_ADMIN_TOKEN }}
          script: |
            const owner = 'Einfo-Tech';
            const notifyContent = Buffer.from(`name: Notify WeCom

on:
  push:
    branches: ['**']
  delete:
  pull_request:
    types: [opened, closed]

jobs:
  notify:
    uses: Einfo-Tech/.github/.github/workflows/wecom-notify.yml@main
    secrets: inherit
`).toString('base64');

            // Get all repos in org
            const repos = await github.paginate(github.rest.repos.listForOrg, {
              org: owner, per_page: 100
            });

            for (const r of repos) {
              if (r.name === '.github' || r.archived) {
                console.log(`⏭️ Skipping ${r.name}`);
                continue;
              }
              try {
                let sha;
                try {
                  const existing = await github.rest.repos.getContent({
                    owner, repo: r.name,
                    path: '.github/workflows/wecom-notify.yml'
                  });
                  sha = existing.data.sha;
                  console.log(`🔄 Updating existing file in ${r.name}`);
                } catch (e) {
                  console.log(`➕ Creating new file in ${r.name}`);
                }

                await github.rest.repos.createOrUpdateFileContents({
                  owner, repo: r.name,
                  path: '.github/workflows/wecom-notify.yml',
                  message: 'ci: add WeCom notification workflow',
                  content: notifyContent,
                  ...(sha ? { sha } : {})
                });
                console.log(`✅ Done: ${r.name}`);
              } catch (err) {
                console.log(`❌ Failed: ${r.name} — ${err.message}`);
              }
            }
